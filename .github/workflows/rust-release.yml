name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch: # Allow manual runs

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libjpeg-dev libv4l-dev libclang-dev clang

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Optimized Release
        run: |
          CARGO_PROFILE_RELEASE_LTO=true \
          CARGO_PROFILE_RELEASE_PANIC=abort \
          CARGO_PROFILE_RELEASE_STRIP=symbols \
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 \
          cargo build --release --target x86_64-unknown-linux-gnu --bin server --features nokhwa/input-v4l

      - name: Prepare Artifact
        run: |
          mv target/x86_64-unknown-linux-gnu/release/server ./robot-control-server-linux-amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-control-server-linux-amd64
          path: ./robot-control-server-linux-amd64

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM64 dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev:arm64 \
            libjpeg-dev:arm64 \
            libv4l-dev:arm64 \
            libssl-dev:arm64 \
            libclang-dev:arm64 \
            clang:arm64 \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Configure cross-compilation
        run: |
          mkdir -p ~/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' > ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Optimized Release
        run: |
          CARGO_PROFILE_RELEASE_LTO=true \
          CARGO_PROFILE_RELEASE_PANIC=abort \
          CARGO_PROFILE_RELEASE_STRIP=symbols \
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 \
          cargo build --release --target aarch64-unknown-linux-gnu --bin server --features nokhwa/input-v4l

      - name: Prepare Artifact
        run: |
          mv target/aarch64-unknown-linux-gnu/release/server ./robot-control-server-linux-arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-control-server-linux-arm64
          path: ./robot-control-server-linux-arm64

  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Optimized Release
        run: |
          CARGO_PROFILE_RELEASE_LTO=true \
          CARGO_PROFILE_RELEASE_PANIC=abort \
          CARGO_PROFILE_RELEASE_STRIP=symbols \
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 \
          cargo build --release --bin server --features nokhwa/input-avfoundation

      - name: Prepare Artifact
        run: |
          mv target/release/server ./robot-control-server-macos-arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-control-server-macos-arm64
          path: ./robot-control-server-macos-arm64

  build-windows-x86_64:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Optimized Release
        run: |
          $env:CARGO_PROFILE_RELEASE_LTO="true"
          $env:CARGO_PROFILE_RELEASE_PANIC="abort"
          $env:CARGO_PROFILE_RELEASE_STRIP="symbols"
          $env:CARGO_PROFILE_RELEASE_CODEGEN_UNITS="1"
          cargo build --release --bin server --features nokhwa/input-msmf

      - name: Prepare Artifact
        run: |
          mv target/release/server.exe ./robot-control-server-windows-x86_64.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-control-server-windows-x86_64
          path: ./robot-control-server-windows-x86_64.exe

  build-windows-arm64:
    name: Build Windows ARM64
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Optimized Release
        run: |
          $env:CARGO_PROFILE_RELEASE_LTO="true"
          $env:CARGO_PROFILE_RELEASE_PANIC="abort"
          $env:CARGO_PROFILE_RELEASE_STRIP="symbols"
          $env:CARGO_PROFILE_RELEASE_CODEGEN_UNITS="1"
          cargo build --release --target aarch64-pc-windows-msvc --bin server --features nokhwa/input-msmf

      - name: Prepare Artifact
        run: |
          mv target/aarch64-pc-windows-msvc/release/server.exe ./robot-control-server-windows-arm64.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-control-server-windows-arm64
          path: ./robot-control-server-windows-arm64.exe

  release:
    name: Create Release
    needs: [build-linux-x86_64, build-linux-arm64, build-macos-arm64, build-windows-x86_64, build-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
