name: Release Binaries

on:
  push:
    tags: ["v*"]

jobs:
  build-release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: robot-control-server
            asset_name: robot-control-server-linux-amd64
          # Add aarch64 linux build if cross-compilation is desired (requires extra setup for dependencies)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libjpeg-dev libv4l-dev libclang-dev clang

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Optimized Release
        run: |
          CARGO_PROFILE_RELEASE_LTO=true \
          CARGO_PROFILE_RELEASE_PANIC=abort \
          CARGO_PROFILE_RELEASE_STRIP=symbols \
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 \
          cargo build --release --target ${{ matrix.target }} --bin robot-control-server

      - name: Prepare Artifact
        run: |
          mv server/target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./${{ matrix.asset_name }}
          generate_release_notes: true
